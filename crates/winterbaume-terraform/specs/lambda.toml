[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "function_name"
view = "function_name"
type = "string"
required = true

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "function_version"
view = "function_version"
type = "string?"

[[resource.field]]
hcl = "description"
view = "description"
type = "string?"

# ---------------------------------------------------------------------------
# aws_lambda_permission
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_lambda_permission"
