view = "PermissionView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "statement_id"
view = "statement_id"
type = "string"
required = true

[[resource.field]]
hcl = "action"
view = "action"
type = "string"
required = true

[[resource.field]]
hcl = "function_name"
view = "function_name"
type = "string"
required = true

[[resource.field]]
hcl = "principal"
view = "principal"
type = "string"
required = true

[[resource.field]]
