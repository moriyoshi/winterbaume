# Auto-ingested by `tf-converter-codegen ingest dms`.
# Hand-tuned: split into one [[resource]] block per resource type
# (endpoint / replication_instance / replication_task). Dropped
# discarded fields (`tags_all`, `ssl_mode`, `secrets_manager_*`,
# `certificate_arn`, `apply_immediately`, `auto_minor_version_upgrade`,
# `vpc_security_group_ids`), nested-blob fields (`s3_settings`,
# `kafka_settings`, `kinesis_settings`, `mongodb_settings`,
# `elasticsearch_settings`, `redis_settings`), and f64 timestamp fields
# (`replication_instance_create_time`, `replication_task_creation_date`,
# `replication_task_start_date`) — those are read straight from
# instance.attributes in the converter.

[service]
name = "dms"
crate_name = "winterbaume_databasemigration"
state_view_module = "views"

# ---------------------------------------------------------------------------
# aws_dms_endpoint
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_dms_endpoint"
model = "EndpointTfModel"
view = "EndpointView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "endpoint_id"
view = "endpoint_id"
type = "string"
required = true

[[resource.field]]
hcl = "endpoint_type"
view = "endpoint_type"
type = "string"
required = true

[[resource.field]]
hcl = "engine_name"
view = "engine_name"
type = "string"
required = true

[[resource.field]]
hcl = "endpoint_arn"
view = "endpoint_arn"
type = "string?"

[[resource.field]]
hcl = "username"
view = "username"
type = "string?"

[[resource.field]]
hcl = "server_name"
view = "server_name"
type = "string?"

[[resource.field]]
hcl = "database_name"
view = "database_name"
type = "string?"

[[resource.field]]
hcl = "status"
view = "status"
type = "string?"

[[resource.field]]
hcl = "extra_connection_attributes"
view = "extra_connection_attributes"
type = "string?"

[[resource.field]]
hcl = "tags"
view = "tags"
type = "tags"

