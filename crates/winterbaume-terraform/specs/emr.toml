[[resource]]
type = "aws_emr_block_public_access_configuration"
model = "BlockPublicAccessConfigurationTfModel"
view = "BlockPublicAccessConfigView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "block_public_security_group_rules"
view = "block_public_security_group_rules"
type = "bool"
required = true

