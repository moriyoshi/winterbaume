[service]
name = "mediapackage"
crate_name = "winterbaume_mediapackage"
state_view_module = "views"

[[resource]]
type = "aws_media_package_channel"
model = "ChannelTfModel"
view = "ChannelView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "channel_id"
view = "channel_id"
type = "string"
required = true

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "description"
view = "description"
type = "string?"

[[resource.field]]
hcl = "created_at"
view = "created_at"
type = "string?"

[[resource.field]]
hcl = "tags"
view = "tags"
type = "tags"
