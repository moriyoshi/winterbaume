# Auto-ingested by `tf-converter-codegen ingest route53resolver`.
# Hand-tuned: split into one [[resource]] block per resource type.
# Dropped Vec<T>/nested-block fields (security_group_ids, protocols,
# ip_address, target_ip, tags, tags_all, domains). Those are read
# straight from instance.attributes in the converter. ARN templates
# and synthesised resolver IDs are wired up by hand.

