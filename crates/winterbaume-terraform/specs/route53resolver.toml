[[resource.field]]
hcl = "domain_name"
view = "domain_name"
type = "string"
required = true

[[resource.field]]
hcl = "rule_type"
view = "rule_type"
type = "string"
required = true

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "name"
view = "name"
type = "string?"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "resolver_endpoint_id"
view = "resolver_endpoint_id"
type = "string?"
