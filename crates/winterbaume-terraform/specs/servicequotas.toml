[service]
name = "servicequotas"
crate_name = "winterbaume_servicequotas"
state_view_module = "views"

[[resource]]
type = "aws_servicequotas_service_quota"
model = "ServiceQuotaTfModel"
view = "ServiceQuotaEntryView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "service_code"
view = "service_code"
type = "string"
required = true

[[resource.field]]
hcl = "quota_code"
view = "quota_code"
type = "string"
required = true

[[resource.field]]
hcl = "service_name"
view = "service_name"
type = "string?"

[[resource.field]]
hcl = "quota_name"
view = "quota_name"
type = "string?"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "unit"
view = "unit"
type = "string?"

[[resource.field]]
hcl = "adjustable"
view = "adjustable"
type = "bool"
default = false

[[resource.field]]
hcl = "global_quota"
view = "global_quota"
type = "bool"
default = false

[[resource.field]]
hcl = "description"
view = "description"
type = "string?"
