[[resource]]
type = "aws_medialive_multiplex"
model = "MediaLiveMultiplexTfModel"
view = "MediaLiveChannelView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "state"
view = "state"
type = "string?"

[[resource.field]]
hcl = "start_multiplex"
view = "start_multiplex"
