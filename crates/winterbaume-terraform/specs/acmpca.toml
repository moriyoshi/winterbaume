# Auto-ingested by `tf-converter-codegen ingest acmpca`.
# Hand-tuned: dropped the nested-block fields
# (`certificate_authority_configuration`, `revocation_configuration`)
# which are read straight from instance.attributes in the converter,
# along with `permanent_deletion_time_in_days` and `usage_mode`
# (informational only). `tags` projects into a HashMap and is then
# converted to the view's Vec<TagView> shape in the converter.

[service]
name = "acmpca"
crate_name = "winterbaume_acmpca"
state_view_module = "views"

[[resource]]
type = "aws_acmpca_certificate_authority"
model = "CertificateAuthorityTfModel"
view = "CertificateAuthorityView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "type"
view = "type"
type = "string?"

[[resource.field]]
hcl = "status"
view = "status"
type = "string?"

[[resource.field]]
hcl = "key_storage_security_standard"
view = "key_storage_security_standard"
type = "string?"

[[resource.field]]
hcl = "certificate"
view = "certificate"
type = "string?"

[[resource.field]]
hcl = "certificate_chain"
view = "certificate_chain"
type = "string?"

[[resource.field]]
hcl = "policy"
view = "policy"
type = "string?"

[[resource.field]]
hcl = "tags"
view = "tags"
type = "tags"
