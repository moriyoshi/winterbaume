# Auto-ingested by `tf-converter-codegen ingest acmpca`.
# Hand-tuned: dropped the nested-block fields
# (`certificate_authority_configuration`, `revocation_configuration`)
# which are read straight from instance.attributes in the converter,
# along with `permanent_deletion_time_in_days` and `usage_mode`
# (informational only). `tags` projects into a HashMap and is then
# converted to the view's Vec<TagView> shape in the converter.

[service]
name = "acmpca"
crate_name = "winterbaume_acmpca"
state_view_module = "views"

[[resource]]
type = "aws_acmpca_certificate_authority"
model = "CertificateAuthorityTfModel"
view = "CertificateAuthorityView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "type"
view = "type"
type = "string?"

[[resource.field]]
hcl = "status"
view = "status"
type = "string?"

[[resource.field]]
hcl = "key_storage_security_standard"
view = "key_storage_security_standard"
type = "string?"

[[resource.field]]
hcl = "certificate"
view = "certificate"
type = "string?"

[[resource.field]]
hcl = "certificate_chain"
view = "certificate_chain"
type = "string?"

[[resource.field]]
hcl = "policy"
view = "policy"
type = "string?"

[[resource.field]]
hcl = "tags"
view = "tags"
type = "tags"

# ---------------------------------------------------------------------------
# aws_acmpca_certificate
# Issued cert under a certificate_authority. Maps to
# CertificateAuthorityView.issued_certificates entry keyed by the cert ARN.
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_acmpca_certificate"
model = "CertificateTfModel"
view = "IssuedCertificateView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "certificate_authority_arn"
view = "certificate_authority_arn"
type = "string"
required = true

[[resource.field]]
hcl = "certificate"
view = "certificate"
type = "string?"

[[resource.field]]
hcl = "certificate_chain"
view = "certificate_chain"
type = "string?"

# ---------------------------------------------------------------------------
# aws_acmpca_certificate_authority_certificate
# Installs the issued certificate (and optional chain) onto the parent CA.
# Updates CertificateAuthorityView.{certificate_pem, certificate_chain_pem}.
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_acmpca_certificate_authority_certificate"
model = "CertificateAuthorityCertificateTfModel"
view = "CertificateAuthorityView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "certificate_authority_arn"
view = "certificate_authority_arn"
type = "string"
required = true

[[resource.field]]
hcl = "certificate"
view = "certificate"
type = "string?"

[[resource.field]]
hcl = "certificate_chain"
view = "certificate_chain"
type = "string?"

# ---------------------------------------------------------------------------
# aws_acmpca_permission
# Grants a service principal permission on a CA. Stored on
# CertificateAuthorityView.permissions keyed by principal.
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_acmpca_permission"
model = "PermissionTfModel"
view = "CaPermissionView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "certificate_authority_arn"
view = "certificate_authority_arn"
type = "string"
required = true

[[resource.field]]
hcl = "principal"
view = "principal"
type = "string"
required = true

[[resource.field]]
hcl = "source_account"
view = "source_account"
type = "string?"

# ---------------------------------------------------------------------------
# aws_acmpca_policy
# Sets the resource policy on a CA. Stored on
# CertificateAuthorityView.policy.
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_acmpca_policy"
model = "PolicyTfModel"
view = "CertificateAuthorityView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "resource_arn"
view = "resource_arn"
type = "string"
required = true

[[resource.field]]
hcl = "policy"
view = "policy"
type = "string"
required = true
