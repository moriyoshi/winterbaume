# Auto-ingested by `tf-converter-codegen ingest ecr`.
# Hand-tuned: fixed model/view names (was `EncryptionConfigTfModel`/
# `EncryptionConfigView`; the projected view is `RepositoryView`). Nested
# `image_scanning_configuration` and `encryption_configuration` blocks
# are read raw by the converter because the spec can't express nested
# arrays of objects. Same for the `rule`/`destination`/`repository_filter`
# blocks on `aws_ecr_registry_scanning_configuration` /
# `aws_ecr_replication_configuration` and the encryption-config block
# on `aws_ecr_repository_creation_template` — those stay in the
# hand-written converter body.

[service]
name = "ecr"
crate_name = "winterbaume_ecr"
state_view_module = "views"

# ---------------------------------------------------------------------------
# aws_ecr_repository
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_ecr_repository"
model = "RepositoryTfModel"
view = "RepositoryView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
