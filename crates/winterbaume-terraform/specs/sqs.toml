[service]
name = "sqs"
crate_name = "winterbaume_sqs"
state_view_module = "views"

[[resource]]
type = "aws_sqs_queue"
model = "SqsQueueTfModel"
view = "QueueStateView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "url"
view = "url"
type = "string?"

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "visibility_timeout_seconds"
view = "visibility_timeout"
type = "u32"
default = 30

[[resource.field]]
hcl = "delay_seconds"
view = "delay_seconds"
type = "u32"
default = 0

[[resource.field]]
hcl = "max_message_size"
view = "maximum_message_size"
type = "u32"
default = 262144

[[resource.field]]
hcl = "message_retention_seconds"
view = "message_retention_period"
type = "u32"
default = 345600

[[resource.field]]
hcl = "receive_wait_time_seconds"
view = "receive_wait_time_seconds"
type = "u32"
default = 0

[[resource.field]]
hcl = "fifo_queue"
view = "fifo_queue"
type = "bool"
default = false

[[resource.field]]
hcl = "content_based_deduplication"
view = "content_based_deduplication"
type = "bool"
default = false

[[resource.field]]
hcl = "tags"
view = "tags"
type = "tags"

[[resource.field]]
hcl = "redrive_policy"
view = "redrive_policy"
type = "string?"

[[resource.field]]
hcl = "policy"
view = "policy"
type = "string?"
