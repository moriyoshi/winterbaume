# Auto-ingested by `tf-converter-codegen ingest apigatewayv2` and hand-tuned.
# Scalar-only `model_only` projections; nested blocks (e.g. cors_configuration,
# response_parameters maps, domain_name_configuration list, route_settings
# list, request_parameters maps) are read raw or skipped in the converter.

