# Auto-ingested by `tf-converter-codegen ingest auditmanager`.
# Hand-tuned: split into one [[resource]] block per resource type
# (control / framework). Dropped unused / nested-block fields
# (`action_plan_instructions`, `testing_information`, `tags_all`,
# `control_mapping_sources`, `control_sets`) — those are read straight
# from instance.attributes in the converter.

[service]
name = "auditmanager"
crate_name = "winterbaume_auditmanager"
state_view_module = "views"

# ---------------------------------------------------------------------------
# aws_auditmanager_control
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_auditmanager_control"
model = "ControlTfModel"
view = "ControlView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "description"
view = "description"
type = "string?"

[[resource.field]]
hcl = "tags"
view = "tags"
type = "tags"

# ---------------------------------------------------------------------------
# aws_auditmanager_framework
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_auditmanager_framework"
model = "FrameworkTfModel"
view = "FrameworkView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "description"
view = "description"
type = "string?"

[[resource.field]]
hcl = "compliance_type"
view = "compliance_type"
type = "string?"

[[resource.field]]
hcl = "tags"
view = "tags"
type = "tags"

# ---------------------------------------------------------------------------
# aws_auditmanager_account_registration
# ---------------------------------------------------------------------------
# Singleton resource that toggles `account_status` between ACTIVE and INACTIVE
# on the AuditManagerStateView. The optional `delegated_admin_account`,
# `deregister_on_destroy`, and `kms_key` inputs do not map to local state and
# are dropped in the converter.

[[resource]]
type = "aws_auditmanager_account_registration"
model = "AccountRegistrationTfModel"
view = "AuditManagerStateView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "delegated_admin_account"
view = "delegated_admin_account"
type = "string?"

[[resource.field]]
hcl = "deregister_on_destroy"
view = "deregister_on_destroy"
type = "bool"

[[resource.field]]
hcl = "kms_key"
view = "kms_key"
type = "string?"

# ---------------------------------------------------------------------------
# aws_auditmanager_assessment
# ---------------------------------------------------------------------------
# Maps to AssessmentView. The synthesised UUID identifier, the `arn`, the
# default `ACTIVE` status, and the nested `roles` / `scope` /
# `assessment_reports_destination` blocks are wired up in the converter and
# read straight from `instance.attributes`.

[[resource]]
type = "aws_auditmanager_assessment"
model = "AssessmentTfModel"
view = "AssessmentView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "description"
view = "description"
type = "string?"

[[resource.field]]
hcl = "framework_id"
view = "framework_id"
type = "string"
required = true

[[resource.field]]
hcl = "tags"
view = "tags"
type = "tags"

# ---------------------------------------------------------------------------
# aws_auditmanager_assessment_delegation
# ---------------------------------------------------------------------------
# Sub-resource of an assessment; AuditManagerState does not track delegations,
# so the converter is a thin shim: deserialise to validate, ignore the rest,
# and emit nothing on extract.

[[resource]]
type = "aws_auditmanager_assessment_delegation"
model = "AssessmentDelegationTfModel"
view = "AssessmentView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "assessment_id"
view = "assessment_id"
type = "string"
required = true

[[resource.field]]
hcl = "control_set_id"
view = "control_set_id"
type = "string"
required = true

[[resource.field]]
hcl = "role_arn"
view = "role_arn"
type = "string"
required = true

[[resource.field]]
hcl = "role_type"
view = "role_type"
type = "string"
required = true

[[resource.field]]
hcl = "comment"
view = "comment"
type = "string?"

