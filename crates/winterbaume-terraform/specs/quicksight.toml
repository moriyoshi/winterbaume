# Auto-ingested by `tf-converter-codegen ingest quicksight`.
# Hand-tuned: split into one [[resource]] block per resource type
# (data_source / group / user). Dropped Vec<T>/nested-block fields
# (credentials, parameters, permission, vpc_connection_properties,
# ssl_properties, tags_all). Those are read straight from
# instance.attributes in the converter. ARN templates and namespace
# fallback are wired up by hand.

[service]
name = "quicksight"
crate_name = "winterbaume_quicksight"
state_view_module = "views"

# ---------------------------------------------------------------------------
# aws_quicksight_data_source
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_quicksight_data_source"
model = "QuickSightDataSourceTfModel"
view = "QuickSightDataSourceView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "data_source_id"
view = "data_source_id"
type = "string"
required = true

[[resource.field]]
hcl = "name"
view = "name"
type = "string?"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "type"
view = "ds_type"
type = "string?"

[[resource.field]]
hcl = "status"
view = "status"
type = "string?"

[[resource.field]]
hcl = "created_time"
view = "created_time"
type = "string?"

[[resource.field]]
hcl = "last_updated_time"
view = "last_updated_time"
type = "string?"

