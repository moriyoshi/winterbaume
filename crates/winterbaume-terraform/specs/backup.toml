# Auto-ingested by `tf-converter-codegen ingest backup`.
# Hand-tuned: split into one [[resource]] per resource type
# (vault / plan). Dropped `force_destroy` (discarded by the original
# converter). On the plan, `tags_all`, `rule`, and
# `advanced_backup_setting` are read straight from instance.attributes
# in the converter (`tags_all` is a HashMap merged with `tags`; `rule`
# and `advanced_backup_setting` are raw nested-block arrays).

[service]
name = "backup"
crate_name = "winterbaume_backup"
state_view_module = "views"

# ---------------------------------------------------------------------------
# aws_backup_vault
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_backup_vault"
model = "VaultTfModel"
view = "BackupVaultView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "tags"
view = "tags"
type = "tags"

# ---------------------------------------------------------------------------
# aws_backup_plan
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_backup_plan"
model = "PlanTfModel"
view = "BackupPlanView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "tags"
view = "tags"
type = "tags"
