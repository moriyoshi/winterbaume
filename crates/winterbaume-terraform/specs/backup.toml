# Auto-ingested by `tf-converter-codegen ingest backup`.
# Hand-tuned: split into one [[resource]] per resource type
# (vault / plan). Dropped `force_destroy` (discarded by the original
# converter). On the plan, `tags_all`, `rule`, and
# `advanced_backup_setting` are read straight from instance.attributes
# in the converter (`tags_all` is a HashMap merged with `tags`; `rule`
# and `advanced_backup_setting` are raw nested-block arrays).
#
# The 11 newer resources (framework, global_settings,
# logically_air_gapped_vault, region_settings, report_plan,
# restore_testing_plan, restore_testing_selection, selection,
# vault_lock_configuration, vault_notifications, vault_policy) are
# scalar-only here; nullable integers, lists, maps, and nested blocks
# are read raw from `instance.attributes` in the converter.

[service]
name = "backup"
crate_name = "winterbaume_backup"
state_view_module = "views"

# ---------------------------------------------------------------------------
# aws_backup_vault
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_backup_vault"
model = "VaultTfModel"
view = "BackupVaultView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "tags"
view = "tags"
type = "tags"

