# Auto-ingested by `tf-converter-codegen ingest secretsmanager`.
# Hand-tuned: split into one [[resource]] block per resource type
# (secret / secret_version). Dropped Vec<String>/binary/discarded
# fields (`version_stages`, `secret_binary`, `secret_string_wo`,
# `force_overwrite_replica_secret`, `tags_all`) — those are read
# straight from instance.attributes in the converter. The ARN
# fall-back chain (arn → id → templated) and the `id`-suffix parsing
# for the version `version_id` stay hand-written.

[service]
name = "secretsmanager"
crate_name = "winterbaume_secretsmanager"
state_view_module = "views"

# ---------------------------------------------------------------------------
# aws_secretsmanager_secret
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_secretsmanager_secret"
model = "SecretTfModel"
view = "SecretView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "description"
view = "description"
type = "string?"

[[resource.field]]
hcl = "policy"
view = "policy"
type = "string?"

[[resource.field]]
hcl = "tags"
view = "tags"
type = "tags"

# ---------------------------------------------------------------------------
# aws_secretsmanager_secret_version
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_secretsmanager_secret_version"
model = "SecretVersionTfModel"
view = "SecretVersionView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "secret_id"
view = "secret_id"
type = "string"
required = true

[[resource.field]]
hcl = "version_id"
view = "version_id"
type = "string?"

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "secret_string"
view = "secret_string"
type = "string?"
