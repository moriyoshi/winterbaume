[service]
name = "ivs"
crate_name = "winterbaume_ivs"
state_view_module = "views"

[[resource]]
type = "aws_ivs_channel"
model = "ChannelTfModel"
view = "ChannelView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "latency_mode"
view = "latency_mode"
type = "string?"

[[resource.field]]
hcl = "type"
view = "channel_type"
type = "string?"

[[resource.field]]
hcl = "authorized"
view = "authorized"
type = "bool"
default = false

[[resource.field]]
hcl = "tags"
view = "tags"
type = "tags"
