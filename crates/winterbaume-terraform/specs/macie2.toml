# Auto-ingested by `tf-converter-codegen ingest macie2`.
# Hand-tuned: split into one [[resource]] per Terraform resource type.
# Dropped:
#   - `s3_job_definition` (raw JSON blob — read raw)
#   - `allow_list_ids` / `custom_data_identifier_ids` /
#     `managed_data_identifier_ids` (Vec<String> — read raw)
#   - `sampling_percentage` (Option<i32> — read raw)
#   - `schedule_frequency` (raw JSON object — read raw)

[service]
name = "macie2"
crate_name = "winterbaume_macie2"
state_view_module = "views"

# ---------------------------------------------------------------------------
# aws_macie2_account
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_macie2_account"
model = "AccountTfModel"
view = "MacieSessionView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "finding_publishing_frequency"
view = "finding_publishing_frequency"
type = "string?"

[[resource.field]]
hcl = "status"
view = "status"
type = "string?"

[[resource.field]]
hcl = "created_at"
view = "created_at"
type = "string?"

[[resource.field]]
hcl = "updated_at"
view = "updated_at"
type = "string?"

[[resource.field]]
hcl = "service_role"
view = "service_role"
type = "string?"

# ---------------------------------------------------------------------------
# aws_macie2_classification_job
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_macie2_classification_job"
model = "ClassificationJobTfModel"
view = "MacieClassificationJobView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "job_type"
view = "job_type"
type = "string"
required = true

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "job_id"
view = "job_id"
type = "string?"

[[resource.field]]
hcl = "job_arn"
view = "job_arn"
type = "string?"

[[resource.field]]
hcl = "name"
view = "name"
type = "string?"

[[resource.field]]
hcl = "description"
view = "description"
type = "string?"

[[resource.field]]
hcl = "job_status"
view = "job_status"
type = "string?"

[[resource.field]]
hcl = "client_token"
view = "client_token"
type = "string?"

[[resource.field]]
hcl = "managed_data_identifier_selector"
view = "managed_data_identifier_selector"
type = "string?"

[[resource.field]]
hcl = "initial_run"
view = "initial_run"
type = "bool"
default = false

[[resource.field]]
hcl = "created_at"
view = "created_at"
type = "string?"

[[resource.field]]
hcl = "last_run_time"
view = "last_run_time"
type = "string?"

[[resource.field]]
hcl = "tags"
view = "tags"
type = "tags"

# ---------------------------------------------------------------------------
# aws_macie2_classification_export_configuration
# ---------------------------------------------------------------------------
# `s3_destination` is a structured block — read raw from instance.attributes.

[[resource]]
type = "aws_macie2_classification_export_configuration"
model = "ClassificationExportConfigurationTfModel"
view = "MacieClassificationExportConfigView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

# ---------------------------------------------------------------------------
# aws_macie2_custom_data_identifier
# ---------------------------------------------------------------------------
# `keywords` / `ignore_words` are Vec<String> — read raw.
# `severity_levels` is a structured list — read raw.

[[resource]]
type = "aws_macie2_custom_data_identifier"
model = "CustomDataIdentifierTfModel"
view = "MacieCustomDataIdentifierView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "regex"
view = "regex"
type = "string"
required = true

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "name"
view = "name"
type = "string?"

[[resource.field]]
hcl = "name_prefix"
view = "name_prefix"
type = "string?"

[[resource.field]]
hcl = "description"
view = "description"
type = "string?"

[[resource.field]]
hcl = "maximum_match_distance"
view = "maximum_match_distance"
type = "i64"
default = 50

[[resource.field]]
hcl = "created_at"
view = "created_at"
type = "string?"

[[resource.field]]
hcl = "tags"
view = "tags"
type = "tags"

# ---------------------------------------------------------------------------
# aws_macie2_findings_filter
# ---------------------------------------------------------------------------
# `finding_criteria` is a structured block — read raw.

[[resource]]
type = "aws_macie2_findings_filter"
model = "FindingsFilterTfModel"
view = "MacieFindingsFilterView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "action"
view = "action"
type = "string"
required = true

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "name"
view = "name"
type = "string?"

[[resource.field]]
hcl = "name_prefix"
view = "name_prefix"
type = "string?"

[[resource.field]]
hcl = "description"
view = "description"
type = "string?"

[[resource.field]]
hcl = "position"
view = "position"
type = "i64"
default = 1

[[resource.field]]
hcl = "tags"
view = "tags"
type = "tags"

# ---------------------------------------------------------------------------
# aws_macie2_invitation_accepter
# ---------------------------------------------------------------------------
# Acceptance is a peer-account operation that mutates the inviting account's
# member record; this converter is warning-only on inject because Winterbaume's
# state is keyed per-account and lacks a state slot for invitation acceptance
# from the recipient's perspective.

[[resource]]
type = "aws_macie2_invitation_accepter"
model = "InvitationAccepterTfModel"
view = "MacieAdministratorView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "administrator_account_id"
view = "administrator_account_id"
type = "string"
required = true

[[resource.field]]
hcl = "invitation_id"
view = "invitation_id"
type = "string?"

