# Auto-ingested by `tf-converter-codegen ingest route53`.
# Hand-tuned: split into one [[resource]] block per resource type
# (zone / record). Dropped Vec<T>/nested-block fields and routing-policy
# Option<Value>/Option<u64> fields (vpc, alias, weighted_routing_policy,
# failover_routing_policy, geolocation_routing_policy,
# latency_routing_policy, multivalue_answer_routing_policy,
# cidr_routing_policy, records, ttl, tags, tags_all, force_destroy,
# allow_overwrite, delegation_set_id). Those are read straight from
# instance.attributes in the converter. The zone_id /hostedzone/
# normalisation, the FQDN computation, and the placeholder zone
# fall-back are wired up by hand.

[service]
name = "route53"
crate_name = "winterbaume_route53"
state_view_module = "views"

# ---------------------------------------------------------------------------
# aws_route53_zone
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_route53_zone"
model = "HostedZoneTfModel"
view = "HostedZoneView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "zone_id"
view = "zone_id"
type = "string?"

[[resource.field]]
hcl = "comment"
view = "comment"
type = "string?"

# ---------------------------------------------------------------------------
# aws_route53_record
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_route53_record"
model = "ResourceRecordSetTfModel"
view = "ResourceRecordSetView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "zone_id"
view = "zone_id"
type = "string"
required = true

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "type"
view = "record_type"
type = "string"
required = true

[[resource.field]]
hcl = "set_identifier"
view = "set_identifier"
type = "string?"

[[resource.field]]
hcl = "health_check_id"
view = "health_check_id"
type = "string?"

# ---------------------------------------------------------------------------
# aws_route53_cidr_collection
# ---------------------------------------------------------------------------
# Top-level collection on `Route53StateView.cidr_collections` keyed by
# collection id (UUID). The TF resource creates an empty collection; the
# converter synthesises the id and arn.

[[resource]]
type = "aws_route53_cidr_collection"
model = "CidrCollectionTfModel"
view = "CidrCollectionView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

# ---------------------------------------------------------------------------
# aws_route53_cidr_location
# ---------------------------------------------------------------------------
# Sub-resource modifier: pushes the `cidr_blocks` list onto an existing
# collection's `locations` map under `name`. The converter uses
# snapshot+mutate+restore. `cidr_blocks` is a `Vec<String>` which the spec
# format does not express, so the converter reads it directly from
# `instance.attributes`.

[[resource]]
type = "aws_route53_cidr_location"
model = "CidrLocationTfModel"
view = "CidrCollectionView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "cidr_collection_id"
view = "cidr_collection_id"
type = "string"
required = true

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

# ---------------------------------------------------------------------------
# aws_route53_delegation_set
# ---------------------------------------------------------------------------
# Top-level collection on `Route53StateView.reusable_delegation_sets` keyed
# by delegation set id (UUID). `reference_name` is captured as the caller
# reference.

[[resource]]
type = "aws_route53_delegation_set"
model = "DelegationSetTfModel"
view = "DelegationSetView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "reference_name"
view = "reference_name"
type = "string?"

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

# ---------------------------------------------------------------------------
# aws_route53_health_check
# ---------------------------------------------------------------------------
# Top-level collection on `Route53StateView.health_checks` keyed by health
# check id (UUID). The TF resource has a number of optional integer and
# boolean fields, plus two `Vec<String>` lists (`child_health_checks`,
# `regions`). The spec only captures the simple required `type` and the
# `reference_name`; the converter reads the rest directly from
# `instance.attributes`.

[[resource]]
type = "aws_route53_health_check"
model = "HealthCheckTfModel"
view = "HealthCheckView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "type"
view = "type_"
type = "string"
required = true

[[resource.field]]
hcl = "reference_name"
view = "reference_name"
type = "string?"

[[resource.field]]
hcl = "fqdn"
view = "fqdn"
type = "string?"

[[resource.field]]
hcl = "ip_address"
view = "ip_address"
type = "string?"

[[resource.field]]
hcl = "resource_path"
view = "resource_path"
type = "string?"

[[resource.field]]
hcl = "search_string"
view = "search_string"
type = "string?"

[[resource.field]]
hcl = "cloudwatch_alarm_name"
view = "cloudwatch_alarm_name"
type = "string?"

[[resource.field]]
hcl = "cloudwatch_alarm_region"
view = "cloudwatch_alarm_region"
type = "string?"

[[resource.field]]
hcl = "insufficient_data_health_status"
view = "insufficient_data_health_status"
type = "string?"

[[resource.field]]
hcl = "routing_control_arn"
view = "routing_control_arn"
type = "string?"

# ---------------------------------------------------------------------------
# aws_route53_hosted_zone_dnssec
# ---------------------------------------------------------------------------
# Singleton flag map: `dnssec_enabled: HashMap<String, bool>` keyed by
# hosted zone id. Inserts `true` if `signing_status == "SIGNING"`,
# else `false`.

[[resource]]
type = "aws_route53_hosted_zone_dnssec"
model = "HostedZoneDnssecTfModel"
view = "Route53StateView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "hosted_zone_id"
view = "hosted_zone_id"
type = "string"
required = true

[[resource.field]]
hcl = "signing_status"
view = "signing_status"
type = "string"
default = "SIGNING"

