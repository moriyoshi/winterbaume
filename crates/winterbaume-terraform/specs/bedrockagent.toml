# Auto-ingested by `tf-converter-codegen ingest bedrockagent`.
# Hand-tuned: split into one [[resource]] block per resource type
# (agent / knowledge_base). Dropped Option<i64> field
# (`idle_session_ttl_in_seconds`), nested-block fields
# (`knowledge_base_configuration`, `storage_configuration`), the
# Vec<String> fields (`failure_reasons`, `recommended_actions`), the
# `tags_all` overlay and the `prepare_agent` bool — those are read
# straight from instance.attributes in the converter.

[service]
name = "bedrockagent"
crate_name = "winterbaume_bedrockagent"
state_view_module = "views"

# ---------------------------------------------------------------------------
# aws_bedrockagent_agent
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_bedrockagent_agent"
model = "AgentTfModel"
view = "AgentView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "agent_name"
view = "agent_name"
type = "string"
required = true

[[resource.field]]
hcl = "agent_id"
view = "agent_id"
type = "string?"

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "agent_arn"
view = "agent_arn"
type = "string?"

[[resource.field]]
