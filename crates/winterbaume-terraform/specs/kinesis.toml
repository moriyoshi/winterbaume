# Auto-ingested by `tf-converter-codegen ingest kinesis`.
# Hand-tuned: model/view fixed to StreamTfModel/StreamView (auto-ingest
# named them after the Shard sub-view). Defaults set so that missing
# `shard_count` becomes 1 and missing `retention_period` becomes 24.
# The nested `stream_mode_details` block is parsed by the converter
# directly from raw attributes.

[service]
name = "kinesis"
crate_name = "winterbaume_kinesis"
state_view_module = "views"

[[resource]]
type = "aws_kinesis_stream"
model = "StreamTfModel"
view = "StreamView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "shard_count"
view = "shard_count"
type = "i64"
default = 1

[[resource.field]]
hcl = "retention_period"
view = "retention_period"
type = "i64"
default = 24

[[resource.field]]
hcl = "encryption_type"
view = "encryption_type"
type = "string?"

[[resource.field]]
hcl = "kms_key_id"
view = "kms_key_id"
type = "string?"

[[resource.field]]
hcl = "tags"
view = "tags"
type = "tags"
