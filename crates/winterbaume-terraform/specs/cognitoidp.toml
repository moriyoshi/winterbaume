# ---------------------------------------------------------------------------
# aws_cognito_managed_user_pool_client
# ---------------------------------------------------------------------------
# Mirrors aws_cognito_user_pool_client but for pools managed by other AWS
# services (OpenSearch etc.). The converter shape is identical; the only
# difference is that `name` is a name_prefix / name_pattern in real TF, but
# we accept the resolved `name` from state for round-tripping.

[[resource]]
type = "aws_cognito_managed_user_pool_client"
model = "ManagedUserPoolClientTfModel"
view = "UserPoolClientView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "name"
view = "name"
type = "string?"

[[resource.field]]
hcl = "user_pool_id"
view = "user_pool_id"
type = "string"
required = true

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "client_secret"
view = "client_secret"
type = "string?"

[[resource.field]]
hcl = "allowed_oauth_flows_user_pool_client"
view = "allowed_oauth_flows_user_pool_client"
type = "bool"
default = false

