# ---------------------------------------------------------------------------
# aws_s3tables_table_bucket_policy
# ---------------------------------------------------------------------------
# Sub-resource modifier: snapshots+mutates+restores the table bucket's
# `policy` field.

[[resource]]
type = "aws_s3tables_table_bucket_policy"
model = "S3TablesTableBucketPolicyTfModel"
view = "TableBucketView"

[resource.modes]
