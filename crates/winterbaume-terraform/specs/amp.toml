required = true

[[resource.field]]
hcl = "workspace_id"
view = "workspace_id"
type = "string"
required = true

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "data"
view = "data"
type = "string?"

