# ---------------------------------------------------------------------------
# aws_kms_external_key
# ---------------------------------------------------------------------------
# Like `aws_kms_key`, but `origin` is forced to `EXTERNAL` and the
# key material is supplied (or generated stub) by the converter.
# `policy`, `deletion_window_in_days`, `bypass_policy_lockout_safety_check`,
# `key_material_base64`, and `valid_to` are consumed and discarded by the
# converter (read raw from instance.attributes).

[[resource]]
type = "aws_kms_external_key"
model = "ExternalKeyTfModel"
view = "KeyView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "key_id"
view = "key_id"
type = "string?"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "description"
view = "description"
type = "string?"

[[resource.field]]
hcl = "enabled"
view = "enabled"
type = "bool"
default = true

[[resource.field]]
hcl = "multi_region"
view = "multi_region"
type = "bool"
default = false

[[resource.field]]
hcl = "tags"
view = "tags"
type = "tags"

