[[resource.field]]
hcl = "name"
view = "name"
type = "string?"

[[resource.field]]
hcl = "key_id"
view = "key_id"
type = "string"
required = true

[[resource.field]]
hcl = "grantee_principal"
view = "grantee_principal"
type = "string"
required = true

[[resource.field]]
hcl = "retiring_principal"
