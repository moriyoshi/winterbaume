[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "key_id"
view = "key_id"
type = "string"
required = true

[[resource.field]]
hcl = "plaintext"
view = "plaintext"
type = "string?"

[[resource.field]]
hcl = "ciphertext_blob"
view = "ciphertext_blob"
type = "string?"

