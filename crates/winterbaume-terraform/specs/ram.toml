[service]
name = "ram"
crate_name = "winterbaume_ram"
state_view_module = "views"

[[resource]]
type = "aws_ram_resource_share"
model = "ResourceShareTfModel"
view = "ResourceShareView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "allow_external_principals"
view = "allow_external_principals"
type = "bool"
default = false

[[resource.field]]
hcl = "tags"
view = "tags"
type = "tags"

# ---------------------------------------------------------------------------
# aws_ram_principal_association
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_ram_principal_association"
model = "RamPrincipalAssociationTfModel"
view = "ResourceShareAssociationView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "resource_share_arn"
view = "resource_share_arn"
type = "string"
required = true

[[resource.field]]
hcl = "principal"
view = "principal"
type = "string"
required = true

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

# ---------------------------------------------------------------------------
# aws_ram_resource_association
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_ram_resource_association"
model = "RamResourceAssociationTfModel"
view = "ResourceShareAssociationView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "resource_share_arn"
view = "resource_share_arn"
type = "string"
required = true

[[resource.field]]
hcl = "resource_arn"
view = "resource_arn"
type = "string"
required = true

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

# ---------------------------------------------------------------------------
# aws_ram_resource_share_accepter
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_ram_resource_share_accepter"
model = "RamResourceShareAccepterTfModel"
view = "ResourceShareInvitationView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "share_arn"
view = "share_arn"
