# Auto-ingested by `tf-converter-codegen ingest appconfig`.
# Hand-tuned: split into one [[resource]] block per resource type
# (application / environment / configuration_profile / deployment_strategy).
# Dropped nested-block fields (`monitor`), `growth_factor` (f32), and
# `tags_all` — those are read straight from instance.attributes in the
# converter.

[service]
name = "appconfig"
crate_name = "winterbaume_appconfig"
state_view_module = "views"

# ---------------------------------------------------------------------------
# aws_appconfig_application
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_appconfig_application"
model = "ApplicationTfModel"
view = "ApplicationView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "id"
view = "id"
type = "string"
required = true

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "description"
view = "description"
type = "string?"

