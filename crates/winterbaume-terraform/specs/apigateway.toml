# Auto-ingested by `tf-converter-codegen ingest apigateway`.
# Hand-tuned: split into one [[resource]] block per resource type
# (rest_api / resource / method / stage / deployment / api_key).
# Dropped Vec<T>/nested-block fields (binary_media_types, endpoint_configuration,
# request_models, request_parameters, stage_key, variables, access_log_settings,
# canary_settings, triggers, tags_all), Option<bool> fields
# (disable_execute_api_endpoint, api_key_required, xray_tracing_enabled,
# cache_cluster_enabled, enabled — the spec only emits plain `bool`, but the
# views model these as `Option<bool>`), and Option<i32>
# (minimum_compression_size). Tags are merged via the standard
# extract_tags() helper (tags + tags_all) in the converter rather than
# read directly from the model field. Those, plus ARN/URL templates and
# the `created_date` constants, are wired up by hand.

[service]
name = "apigateway"
crate_name = "winterbaume_apigateway"
state_view_module = "views"

