[[resource]]
type = "aws_api_gateway_rest_api"
model = "RestApiTfModel"
view = "RestApiView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "id"
view = "id"
type = "string"
required = true

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
