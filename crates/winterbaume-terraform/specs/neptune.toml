[[resource.field]]
hcl = "neptune_subnet_group_name"
view = "neptune_subnet_group_name"
type = "string?"

[[resource.field]]
hcl = "neptune_cluster_parameter_group_name"
view = "neptune_cluster_parameter_group_name"
type = "string?"

[[resource.field]]
hcl = "kms_key_arn"
view = "kms_key_arn"
type = "string?"

[[resource.field]]
hcl = "endpoint"
view = "endpoint"
type = "string?"

[[resource.field]]
hcl = "reader_endpoint"
view = "reader_endpoint"
type = "string?"

[[resource.field]]
hcl = "storage_encrypted"
