# Auto-ingested by `tf-converter-codegen ingest networkfirewall`.
# Hand-tuned: split into one [[resource]] block per resource type
# (firewall / firewall_policy / rule_group). Dropped Vec<T>/nested-block
# fields (subnet_mapping, encryption_configuration, firewall_policy,
# rule_group, firewall_status) and the discarded tags_all field. Tags
# are read into Vec<(String, String)> via extract_tags_vec() in the
# converter. ARN templates and synthesised UUIDs are wired up by hand.

[service]
name = "networkfirewall"
crate_name = "winterbaume_networkfirewall"
state_view_module = "views"

# ---------------------------------------------------------------------------
# aws_networkfirewall_firewall
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_networkfirewall_firewall"
model = "FirewallTfModel"
view = "FirewallView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "firewall_policy_arn"
view = "firewall_policy_arn"
type = "string?"

[[resource.field]]
hcl = "vpc_id"
view = "vpc_id"
type = "string?"

[[resource.field]]
hcl = "delete_protection"
view = "delete_protection"
type = "bool"
default = false

[[resource.field]]
hcl = "subnet_change_protection"
view = "subnet_change_protection"
type = "bool"
default = false

[[resource.field]]
hcl = "firewall_policy_change_protection"
view = "firewall_policy_change_protection"
type = "bool"
default = false

[[resource.field]]
hcl = "description"
view = "description"
type = "string?"

# ---------------------------------------------------------------------------
# aws_networkfirewall_firewall_policy
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_networkfirewall_firewall_policy"
model = "FirewallPolicyTfModel"
view = "FirewallPolicyView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "description"
view = "description"
type = "string?"

# ---------------------------------------------------------------------------
# aws_networkfirewall_rule_group
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_networkfirewall_rule_group"
model = "RuleGroupTfModel"
view = "RuleGroupView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "type"
view = "rule_group_type"
type = "string"
required = true

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "capacity"
view = "capacity"
type = "i64"
default = 100

[[resource.field]]
hcl = "description"
view = "description"
type = "string?"

[[resource.field]]
hcl = "rules"
view = "rules"
type = "string?"
