[[resource.field]]
hcl = "rules"
view = "rules"
type = "string?"

# ---------------------------------------------------------------------------
# aws_networkfirewall_logging_configuration
# ---------------------------------------------------------------------------
# Sub-resource: serialises the `logging_configuration` nested block onto
# `NetworkFirewallStateView.logging_configs[firewall_arn]` (a JSON string).

[[resource]]
type = "aws_networkfirewall_logging_configuration"
model = "LoggingConfigurationTfModel"
view = "FirewallView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "firewall_arn"
view = "firewall_arn"
type = "string"
required = true

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

# ---------------------------------------------------------------------------
