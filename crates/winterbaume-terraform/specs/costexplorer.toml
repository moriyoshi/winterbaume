# Auto-ingested by `tf-converter-codegen ingest costexplorer`.
# Hand-tuned: split into one [[resource]] block per resource type
# (anomaly_monitor / anomaly_subscription). ARN templates, the
# default `creation_date` / `last_updated_date` constants, the
# `monitor_arn_list` Vec<String>, the nested `subscriber` array,
# and the `threshold` f64 are all read straight from
# instance.attributes in the converter (Vec<T> / Option<f64> are
# not part of the spec field-type vocabulary).

[service]
