model = "AppRunnerServiceTfModel"
view = "AppRunnerServiceView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "service_name"
view = "service_name"
type = "string"
required = true

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "service_id"
