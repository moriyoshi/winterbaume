# Auto-ingested by `tf-converter-codegen ingest apprunner`.
# Hand-tuned: dropped json-blob fields (encryption_configuration,
# health_check_configuration, instance_configuration, network_configuration,
# observability_configuration, source_configuration, tags_all,
# auto_scaling_configuration_arn) so the converter reads them straight from
# instance.attributes. Kept only the strongly-typed scalar inputs.

[service]
name = "apprunner"
crate_name = "winterbaume_apprunner"
