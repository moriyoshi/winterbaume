[[resource.field]]
hcl = "e_tag"
view = "e_tag"
type = "string?"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "created_at"
view = "created_at"
type = "string?"

[[resource.field]]
hcl = "modified_at"
view = "modified_at"
type = "string?"

[[resource.field]]
hcl = "tags"
view = "tags"
type = "tags"
