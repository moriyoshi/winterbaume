# Auto-ingested by `tf-converter-codegen ingest applicationautoscaling`.
# Hand-tuned: split the union spec into one [[resource]] per resource type
# (target / policy). Dropped nested-block fields (`suspended_state`,
# `target_tracking_scaling_policy_configuration`,
# `step_scaling_policy_configuration`) -- those are read straight from
# instance.attributes in the converter.

[service]
name = "applicationautoscaling"
crate_name = "winterbaume_applicationautoscaling"
state_view_module = "views"

# ---------------------------------------------------------------------------
# aws_appautoscaling_target
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_appautoscaling_target"
model = "ScalableTargetTfModel"
view = "ScalableTargetView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "service_namespace"
view = "service_namespace"
type = "string"
required = true

[[resource.field]]
hcl = "resource_id"
view = "resource_id"
type = "string"
required = true

[[resource.field]]
hcl = "scalable_dimension"
view = "scalable_dimension"
type = "string"
required = true

[[resource.field]]
hcl = "min_capacity"
view = "min_capacity"
type = "i64"
default = 0

[[resource.field]]
hcl = "max_capacity"
view = "max_capacity"
type = "i64"
default = 0

[[resource.field]]
hcl = "role_arn"
view = "role_arn"
type = "string?"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

# ---------------------------------------------------------------------------
# aws_appautoscaling_policy
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_appautoscaling_policy"
model = "ScalingPolicyTfModel"
view = "ScalingPolicyView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "service_namespace"
view = "service_namespace"
type = "string"
required = true

[[resource.field]]
hcl = "resource_id"
view = "resource_id"
type = "string"
required = true

[[resource.field]]
hcl = "scalable_dimension"
view = "scalable_dimension"
type = "string"
required = true

[[resource.field]]
hcl = "policy_type"
view = "policy_type"
type = "string?"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"
