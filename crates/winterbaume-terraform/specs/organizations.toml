# Auto-ingested by `tf-converter-codegen ingest organizations`.
# Hand-tuned: split into one [[resource]] block per resource type
# (account / organizational_unit / policy). ARN templates, the
# parent_id default ("r-root"), the random member account ID, the
# UUID-derived OU/policy IDs, the create_account_status_id, the
# `joined_method = "CREATED"` / `status = "ACTIVE"` / `aws_managed = false`
# constants, and the per-resource tags handling are wired up by hand.
# Tags are dropped from the model: account uses extract_org_tags() to
# populate the state-view tags map, and OU / policy don't model tags.

[service]
name = "organizations"
crate_name = "winterbaume_organizations"
state_view_module = "views"

# ---------------------------------------------------------------------------
# aws_organizations_account
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_organizations_account"
model = "AccountTfModel"
view = "AccountView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "email"
view = "email"
type = "string"
required = true

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "parent_id"
view = "parent_id"
type = "string?"

