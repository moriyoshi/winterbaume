# ---------------------------------------------------------------------------

[[resource]]
type = "aws_cognito_identity_pool_provider_principal_tag"
model = "CognitoIdentityPoolProviderPrincipalTagTfModel"
view = "PrincipalTagEntryView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "identity_pool_id"
view = "identity_pool_id"
type = "string"
required = true

[[resource.field]]
hcl = "identity_provider_name"
view = "identity_provider_name"
type = "string"
required = true

