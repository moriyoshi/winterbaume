[service]
name = "kinesisvideo"
crate_name = "winterbaume_kinesisvideo"
state_view_module = "views"

[[resource]]
type = "aws_kinesis_video_stream"
model = "StreamTfModel"
view = "StreamView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "device_name"
view = "device_name"
type = "string?"

[[resource.field]]
hcl = "media_type"
view = "media_type"
type = "string?"

[[resource.field]]
hcl = "kms_key_id"
view = "kms_key_id"
type = "string?"

[[resource.field]]
hcl = "data_retention_in_hours"
view = "data_retention_in_hours"
type = "i64"
default = 0

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "version"
view = "version"
type = "string?"

[[resource.field]]
hcl = "status"
view = "status"
type = "string?"

[[resource.field]]
hcl = "creation_time"
view = "creation_time"
type = "string?"

[[resource.field]]
hcl = "tags"
view = "tags"
type = "tags"
