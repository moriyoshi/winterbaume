# Auto-ingested by `tf-converter-codegen ingest sesv1`.
# Hand-tuned: split into one [[resource]] block per resource type.
# All resources use `mode = "model_only"` so that nested-block fields and
# list fields can be sliced off at the spec layer and handled directly in
# the converter where needed. The IdentityView projection, the ARN
# templates, the SES tag merges, and the snapshot-and-mutate plumbing for
# modifier-style resources (DKIM enable, mail-from, notification topic,
# event destination, identity verification) live in the converter.

[service]
name = "sesv1"
crate_name = "winterbaume_ses"
state_view_module = "views"

# ---------------------------------------------------------------------------
# aws_ses_email_identity
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_ses_email_identity"
model = "EmailIdentityTfModel"
view = "IdentityView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "email"
view = "email"
type = "string"
required = true

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

