[service]
name = "sesv1"
crate_name = "winterbaume_ses"
state_view_module = "views"

# ---------------------------------------------------------------------------
# aws_ses_email_identity
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_ses_email_identity"
