# ---------------------------------------------------------------------------
# aws_ses_identity_notification_topic
# ---------------------------------------------------------------------------
# Modifier on an existing identity: routes one of the three notification
# types (Bounce / Complaint / Delivery) to an SNS topic ARN. The converter
# dispatches on notification_type and writes the matching field on
# `IdentityView` (`bounce_topic` / `complaint_topic` / `delivery_topic`).
# `include_original_headers` is not modelled in the view.

[[resource]]
type = "aws_ses_identity_notification_topic"
model = "IdentityNotificationTopicTfModel"
view = "IdentityView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "identity"
view = "identity"
type = "string"
required = true

[[resource.field]]
hcl = "notification_type"
view = "notification_type"
type = "string"
required = true

[[resource.field]]
hcl = "topic_arn"
view = "topic_arn"
type = "string?"

[[resource.field]]
hcl = "include_original_headers"
view = "include_original_headers"
type = "bool"
default = false

