# exist in state, a warning is emitted and the resource is skipped.

[[resource]]
type = "aws_ses_domain_dkim"
model = "DomainDkimTfModel"
view = "IdentityView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "domain"
view = "domain"
type = "string"
required = true

