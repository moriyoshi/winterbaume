# ---------------------------------------------------------------------------
# aws_ses_active_receipt_rule_set
# ---------------------------------------------------------------------------
# Singleton modifier: sets `SesV1StateView.active_receipt_rule_set` to the
# named rule set. The converter takes a snapshot, swaps the field, and
# restores the view.

[[resource]]
type = "aws_ses_active_receipt_rule_set"
model = "ActiveReceiptRuleSetTfModel"
view = "IdentityView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "rule_set_name"
view = "rule_set_name"
type = "string"
required = true

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

# ---------------------------------------------------------------------------
# aws_ses_configuration_set
# ---------------------------------------------------------------------------
# Top-level fresh-write on `SesV1StateView.configuration_sets`. The nested
# delivery_options / reputation_metrics_enabled / sending_enabled / tracking_options
# blocks are scalar-only in TF and we only model the name + flags here;
# event destinations live on the sibling `aws_ses_event_destination`
# resource.

[[resource]]
type = "aws_ses_configuration_set"
model = "ConfigurationSetTfModel"
view = "IdentityView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "reputation_metrics_enabled"
view = "reputation_metrics_enabled"
type = "bool"
default = false

[[resource.field]]
hcl = "sending_enabled"
view = "sending_enabled"
type = "bool"
default = true

# ---------------------------------------------------------------------------
# aws_ses_domain_dkim
# ---------------------------------------------------------------------------
# Modifier on an existing domain identity: flips dkim_enabled on the
