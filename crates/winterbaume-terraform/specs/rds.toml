# Auto-ingested by `tf-converter-codegen ingest rds`.
# Hand-tuned: split into one [[resource]] block per resource type
# (db_subnet_group / db_parameter_group / rds_cluster_parameter_group /
# db_option_group / db_instance / rds_cluster / db_event_subscription).
# Dropped Vec<T>/nested-block fields (subnet_ids, vpc_security_group_ids,
# availability_zones, parameter, option, source_ids, event_categories,
# tags, tags_all, name_prefix, timeouts, blue_green_update,
# restore_to_point_in_time, s3_import, scaling_configuration,
# serverlessv2_scaling_configuration, plus assorted advanced
# pass-through scalar fields kept as `_ = attrs.get(...)`),
# Option<i64>/Option<i32> view fields (port, iops, monitoring_interval,
# allocated_storage on cluster), and discarded TF-only flags
# (allow_major_version_upgrade, apply_immediately, skip_final_snapshot,
# final_snapshot_identifier, etc.). Those are read straight from
# instance.attributes in the converter. ARN templates and the
# "Managed by Terraform" description default are wired up by hand.

[service]
name = "rds"
crate_name = "winterbaume_rds"
state_view_module = "views"

