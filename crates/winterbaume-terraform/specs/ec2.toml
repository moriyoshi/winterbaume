# ---------------------------------------------------------------------------
# Wave 7 — EBS account-level singletons and snapshot lifecycle resources.
# These six `aws_ebs_*` resource types are served by the EC2 service crate
# (state lives on `Ec2State`), not the separate `winterbaume-ebs` crate.
# `aws_ebs_snapshot_copy` and `aws_ebs_snapshot_import` use the existing
# `ec2::SnapshotView` / `ec2::SnapshotImportTaskView` collections; nested
# blocks (`disk_container`, `user_bucket`) are read raw in the converter
# because they are outside the spec's scalar vocabulary.
# `aws_ebs_snapshot_block_public_access` has no state field on `Ec2State`
# today (the `EnableSnapshotBlockPublicAccess` handler is a stub), so the
# converter is a no-op that records a warning.
# ---------------------------------------------------------------------------

