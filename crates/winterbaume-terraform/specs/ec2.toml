# Hand-tuned: split into one [[resource]] block per resource type for the
# 39 EC2 converters (VPC / Subnet / IGW / Route Table / Route /
# Security Group / Key Pair / EIP / NAT GW / Placement Group /
# Network ACL / Network ACL Rule / Egress-only IGW / Customer Gateway /
# EC2 Capacity Reservation / Network Interface Permission /
# Instance Connect Endpoint / VPC IPAM family /
# Verified Access family / Traffic Mirror family /
# Transit Gateway extensions / Network Insights /
# Local Gateway routes / Capacity Block Reservation).
#
# Field types are restricted to scalars (string, string?, bool, i64).
# Vec<T>, nested-block fields, ARN/URL templates, secondary lookups
# (subnet -> vpc_id, ipam_scope -> ipam_arn, etc.), and tags are read
# straight from instance.attributes in the converter.

[service]
name = "ec2"
crate_name = "winterbaume_ec2"
state_view_module = "views"

# ---------------------------------------------------------------------------
# aws_vpc
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_vpc"
model = "VpcTfModel"
view = "VpcView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "cidr_block"
view = "cidr_block"
type = "string"
required = true

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "dhcp_options_id"
view = "dhcp_options_id"
type = "string?"

[[resource.field]]
hcl = "instance_tenancy"
view = "instance_tenancy"
type = "string?"

[[resource.field]]
hcl = "default"
view = "default_"
type = "bool"

[[resource.field]]
hcl = "enable_dns_hostnames"
view = "enable_dns_hostnames"
type = "bool"

[[resource.field]]
hcl = "enable_dns_support"
view = "enable_dns_support"
type = "bool"

