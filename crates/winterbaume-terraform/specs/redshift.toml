# Auto-ingested by `tf-converter-codegen ingest redshift`.
# Hand-tuned: split into one [[resource]] block per resource type
# (cluster / subnet_group). Dropped Vec<T>/nested-block fields
# (logging, snapshot_copy, iam_roles, vpc_security_group_ids,
# subnet_ids on subnet_group, tags_all). Those are read straight
# from instance.attributes in the converter. ARN templates are wired
# up by hand. The converter parses cluster_status into the typed
# enum; we keep it as `string?` here.

[service]
name = "redshift"
crate_name = "winterbaume_redshift"
state_view_module = "views"

# ---------------------------------------------------------------------------
# aws_redshift_cluster
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_redshift_cluster"
model = "RedshiftClusterTfModel"
view = "RedshiftClusterView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "cluster_identifier"
view = "cluster_identifier"
type = "string"
required = true

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "node_type"
view = "node_type"
type = "string?"

[[resource.field]]
hcl = "master_username"
view = "master_username"
type = "string?"

[[resource.field]]
hcl = "database_name"
view = "database_name"
type = "string?"

[[resource.field]]
hcl = "number_of_nodes"
view = "number_of_nodes"
type = "i64"
default = 1

[[resource.field]]
hcl = "cluster_status"
view = "cluster_status"
type = "string?"

[[resource.field]]
hcl = "cluster_version"
view = "cluster_version"
type = "string?"

[[resource.field]]
hcl = "availability_zone"
view = "availability_zone"
type = "string?"

[[resource.field]]
hcl = "cluster_subnet_group_name"
view = "cluster_subnet_group_name"
type = "string?"

[[resource.field]]
hcl = "vpc_id"
view = "vpc_id"
type = "string?"

[[resource.field]]
hcl = "endpoint"
view = "endpoint"
type = "string?"

[[resource.field]]
hcl = "port"
view = "port"
type = "i64"
default = 5439

[[resource.field]]
hcl = "encrypted"
view = "encrypted"
type = "bool"
default = false

[[resource.field]]
hcl = "publicly_accessible"
view = "publicly_accessible"
type = "bool"
default = false

[[resource.field]]
hcl = "preferred_maintenance_window"
view = "preferred_maintenance_window"
type = "string?"

[[resource.field]]
hcl = "automated_snapshot_retention_period"
view = "automated_snapshot_retention_period"
type = "i64"
default = 1

# ---------------------------------------------------------------------------
# aws_redshift_subnet_group
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_redshift_subnet_group"
model = "RedshiftSubnetGroupTfModel"
view = "RedshiftSubnetGroupView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "description"
view = "description"
type = "string?"

[[resource.field]]
hcl = "vpc_id"
view = "vpc_id"
type = "string?"
