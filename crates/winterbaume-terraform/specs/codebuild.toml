view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "base_capacity"
view = "base_capacity"
type = "i64"
default = 1

[[resource.field]]
hcl = "environment_type"
view = "environment_type"
type = "string?"

[[resource.field]]
hcl = "compute_type"
view = "compute_type"
type = "string?"

