[[resource.field]]
hcl = "selection_criteria"
view = "selection_criteria"
type = "string?"

# ---------------------------------------------------------------------------
# aws_cloudwatch_log_anomaly_detector
# ---------------------------------------------------------------------------
# `log_group_arn_list` is a Vec<String> — not in spec vocabulary, read raw.

[[resource]]
type = "aws_cloudwatch_log_anomaly_detector"
model = "LogAnomalyDetectorTfModel"
view = "LogAnomalyDetectorView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "detector_name"
view = "detector_name"
type = "string?"

[[resource.field]]
hcl = "evaluation_frequency"
view = "evaluation_frequency"
type = "string?"

[[resource.field]]
hcl = "filter_pattern"
view = "filter_pattern"
type = "string?"

[[resource.field]]
hcl = "anomaly_visibility_time"
view = "anomaly_visibility_time"
type = "i64"
default = 0

[[resource.field]]
hcl = "kms_key_id"
view = "kms_key_id"
type = "string?"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "enabled"
view = "enabled"
type = "bool"
default = true

