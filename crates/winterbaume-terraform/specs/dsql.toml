[service]
name = "dsql"
crate_name = "winterbaume_dsql"
state_view_module = "views"

[[resource]]
type = "aws_dsql_cluster"
model = "ClusterTfModel"
view = "ClusterView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "deletion_protection_enabled"
view = "deletion_protection_enabled"
type = "bool"
default = false

[[resource.field]]
hcl = "tags"
view = "tags"
type = "tags"
