# Auto-ingested by `tf-converter-codegen ingest glue`.
# Hand-tuned: split into one [[resource]] block per resource type.
# Dropped Vec<T>/nested-block fields (parameters, default_arguments,
# command, connections, non_overridable_arguments, target_database,
# s3_target, dynamodb_target, delta_target, jdbc_target,
# lake_formation_configuration, lineage_configuration, recrawl_policy,
# schema_change_policy, tags_all, max_capacity (Option<f64>),
# number_of_workers (Option<i32>), partition_keys, storage_descriptor,
# physical_connection_requirements, match_criteria, security_group_ids,
# arguments, public_keys, encryption_configuration, encryption_at_rest,
# connection_password_encryption, schema_definition, actions, predicate,
# input_record_tables, partition_index, values, connection_properties).
# Those are read straight from instance.attributes in the converter.
# ARN templates and timestamp constants are wired up by hand.

[service]
name = "glue"
crate_name = "winterbaume_glue"
state_view_module = "views"

# ---------------------------------------------------------------------------
# aws_glue_catalog_database
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_glue_catalog_database"
model = "CatalogDatabaseTfModel"
view = "DatabaseView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "catalog_id"
view = "catalog_id"
type = "string?"

[[resource.field]]
hcl = "description"
view = "description"
type = "string?"

[[resource.field]]
hcl = "location_uri"
view = "location_uri"
type = "string?"

