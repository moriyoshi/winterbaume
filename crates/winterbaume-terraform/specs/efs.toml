# Auto-ingested by `tf-converter-codegen ingest efs`.
# Hand-tuned: dropped the nested `lifecycle_policy` and `protection`
# blocks (read raw and parsed into LifecyclePolicyView /
# FileSystemProtectionView in the converter), the `tags` /
# `tags_all` HashMap-structured maps (the view stores Vec<TagView>, so
# we merge them by hand), and the discarded `availability_zone_name`
# / `kms_key_id` / `provisioned_throughput_in_mibps` raw reads.

[service]
name = "efs"
crate_name = "winterbaume_efs"
state_view_module = "views"

[[resource]]
type = "aws_efs_file_system"
model = "FileSystemTfModel"
view = "FileSystemView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "creation_token"
view = "creation_token"
type = "string?"

[[resource.field]]
hcl = "performance_mode"
view = "performance_mode"
type = "string?"

[[resource.field]]
hcl = "throughput_mode"
view = "throughput_mode"
type = "string?"

[[resource.field]]
hcl = "encrypted"
view = "encrypted"
type = "bool"
default = false

# ---------------------------------------------------------------------------
# aws_efs_access_point
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_efs_access_point"
model = "AccessPointTfModel"
view = "AccessPointView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "file_system_id"
view = "file_system_id"
type = "string"
required = true

[[resource.field]]
hcl = "name"
view = "name"
type = "string?"

# ---------------------------------------------------------------------------
# aws_efs_backup_policy (modifies existing file_system — warning-only)
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_efs_backup_policy"
model = "BackupPolicyTfModel"
view = "BackupPolicyView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "file_system_id"
view = "file_system_id"
type = "string"
required = true

# ---------------------------------------------------------------------------
# aws_efs_file_system_policy (modifies existing file_system — warning-only)
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_efs_file_system_policy"
model = "FileSystemPolicyTfModel"
view = "FileSystemPolicyView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "file_system_id"
view = "file_system_id"
type = "string"
required = true

[[resource.field]]
hcl = "policy"
view = "policy"
type = "string"
required = true

# ---------------------------------------------------------------------------
# aws_efs_mount_target
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_efs_mount_target"
model = "MountTargetTfModel"
view = "MountTargetView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "file_system_id"
view = "file_system_id"
type = "string"
required = true

[[resource.field]]
hcl = "subnet_id"
view = "subnet_id"
type = "string"
required = true

[[resource.field]]
hcl = "ip_address"
view = "ip_address"
type = "string?"

# ---------------------------------------------------------------------------
# aws_efs_replication_configuration
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_efs_replication_configuration"
model = "ReplicationConfigurationTfModel"
view = "ReplicationConfigurationView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "source_file_system_id"
view = "source_file_system_id"
type = "string"
required = true
