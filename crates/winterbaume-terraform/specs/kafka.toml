# Auto-ingested by `tf-converter-codegen ingest kafka`.
# Hand-tuned: kept only the strongly-typed scalar inputs. The nested
# blocks (`broker_node_group_info`, `client_authentication`,
# `configuration_info`, `encryption_info`, `logging_info`,
# `open_monitoring`), the i32 `number_of_broker_nodes`, and the
# discarded fields (`cluster_name_prefix`, `vpc_connectivity_authentication`,
# `node_exporter`, `storage_mode`, `tags_all`, the various `bootstrap_brokers_*`
# computed outputs, `broker_count`) are read straight from instance.attributes
# in the converter.
#
# Resources sharing the kafka prefix (aws_mskconnect_* would map separately).
# Only `aws_msk_cluster` and `aws_msk_serverless_cluster` have backing state
# slots in `winterbaume_kafka` (the latter via the shared `ClusterView` with
# `cluster_type = "SERVERLESS"`). The other five resources are validated and
# decoded but inject is a no-op with a warning, because the service crate
# has no state slot for them.

[service]
name = "kafka"
crate_name = "winterbaume_kafka"
state_view_module = "views"

# ---------------------------------------------------------------------------
# aws_msk_cluster
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_msk_cluster"
model = "ClusterTfModel"
view = "ClusterView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "cluster_name"
view = "cluster_name"
type = "string"
required = true

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "kafka_version"
view = "kafka_version"
type = "string?"

[[resource.field]]
hcl = "tags"
view = "tags"
type = "tags"

# ---------------------------------------------------------------------------
# aws_msk_cluster_policy (warning-only — no dedicated state slot)
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_msk_cluster_policy"
model = "ClusterPolicyTfModel"
view = "ClusterView"

[resource.modes]
