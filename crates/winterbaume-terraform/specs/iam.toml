# ---------------------------------------------------------------------------
# aws_iam_account_password_policy
# ---------------------------------------------------------------------------
# Singleton view: the inject merges the policy into the
# `account_password_policy` field on `IamStateView`.

[[resource]]
type = "aws_iam_account_password_policy"
model = "IamAccountPasswordPolicyTfModel"
view = "AccountPasswordPolicyView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "minimum_password_length"
view = "minimum_password_length"
type = "i64"
default = 6

[[resource.field]]
hcl = "require_symbols"
view = "require_symbols"
type = "bool"
default = false

[[resource.field]]
hcl = "require_numbers"
view = "require_numbers"
type = "bool"
default = false

[[resource.field]]
hcl = "require_uppercase_characters"
view = "require_uppercase_characters"
type = "bool"
default = false

[[resource.field]]
hcl = "require_lowercase_characters"
view = "require_lowercase_characters"
type = "bool"
default = false

[[resource.field]]
hcl = "allow_users_to_change_password"
view = "allow_users_to_change_password"
type = "bool"
default = false

[[resource.field]]
hcl = "expire_passwords"
view = "expire_passwords"
type = "bool"
default = false

# `max_password_age`, `password_reuse_prevention`, and `hard_expiry` are
# optional integer/bool fields. The codegen currently does not express
# `i64?` / `bool?`, so the converter reads them directly from
# `instance.attributes`.

