[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "path"
view = "path"
type = "string?"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "unique_id"
view = "unique_id"
type = "string?"

[[resource.field]]
hcl = "assume_role_policy"
view = "assume_role_policy"
type = "string?"

[[resource.field]]
hcl = "description"
view = "description"
type = "string?"

[[resource.field]]
hcl = "max_session_duration"
view = "max_session_duration"
type = "i64"
default = 3600

[[resource.field]]
hcl = "permissions_boundary"
view = "permissions_boundary"
type = "string?"

