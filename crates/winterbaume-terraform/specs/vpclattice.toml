# Auto-ingested by `tf-converter-codegen ingest vpclattice`.
# Hand-tuned: split into one [[resource]] block per resource type
# (service / service_network / target_group / listener). Dropped the
# nested-block fields (config for target groups, default_action for
# listeners) so the converter reads them straight from
# instance.attributes. ARN templates and timestamp constants are
# wired up by hand.

[service]
name = "vpclattice"
crate_name = "winterbaume_vpclattice"
state_view_module = "views"

# ---------------------------------------------------------------------------
# aws_vpclattice_service
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_vpclattice_service"
model = "VpcLatticeServiceTfModel"
view = "ServiceView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "auth_type"
view = "auth_type"
type = "string?"

[[resource.field]]
hcl = "status"
view = "status"
type = "string?"

[[resource.field]]
hcl = "tags"
view = "tags"
type = "tags"

