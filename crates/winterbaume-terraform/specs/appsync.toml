[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "authentication_type"
view = "authentication_type"
type = "string?"

[[resource.field]]
hcl = "xray_enabled"
