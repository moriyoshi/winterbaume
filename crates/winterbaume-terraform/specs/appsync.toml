view = "api_id"
type = "string"
required = true

[[resource.field]]
hcl = "type"
view = "cache_type"
type = "string?"

[[resource.field]]
hcl = "api_caching_behavior"
view = "api_caching_behavior"
type = "string?"

[[resource.field]]
hcl = "health_metrics_config"
view = "health_metrics_config"
type = "string?"

[[resource.field]]
hcl = "at_rest_encryption_enabled"
view = "at_rest_encryption_enabled"
type = "bool"
default = false

[[resource.field]]
hcl = "transit_encryption_enabled"
view = "transit_encryption_enabled"
type = "bool"
default = false

[[resource.field]]
hcl = "ttl"
view = "ttl"
type = "i64"
default = 0

