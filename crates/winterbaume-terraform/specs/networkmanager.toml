# Auto-ingested by `tf-converter-codegen ingest networkmanager`.
# Hand-tuned: split into one [[resource]] block per resource type
# (global_network / site / device). Dropped raw-Value blob fields
# (location, aws_location) so the converter reads them straight from
# instance.attributes. ARN templates and `state = "AVAILABLE"` /
# `created_at` / empty description defaults are wired up by hand.

[service]
name = "networkmanager"
crate_name = "winterbaume_networkmanager"
state_view_module = "views"

# ---------------------------------------------------------------------------
# aws_networkmanager_global_network
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_networkmanager_global_network"
model = "GlobalNetworkTfModel"
view = "GlobalNetworkView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "description"
view = "description"
type = "string?"

[[resource.field]]
hcl = "state"
view = "state"
type = "string?"

[[resource.field]]
hcl = "created_at"
view = "created_at"
type = "string?"

[[resource.field]]
hcl = "tags"
view = "tags"
type = "tags"

