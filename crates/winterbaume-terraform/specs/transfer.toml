# Auto-ingested by `tf-converter-codegen ingest transfer`.
# Hand-tuned: split into one [[resource]] block per resource type
# (server / user). Dropped raw-Value blob fields (endpoint_details,
# protocol_details, workflow_details, s3_storage_options,
# home_directory_mappings, posix_profile), the Vec<String> protocols
# field, the discarded force_destroy / host_key /
# structured_log_destinations / pre_authentication_login_banner /
# post_authentication_login_banner / policy fields, and the tag
# fields (the converter calls extract_tag_views() to merge tags
# + tags_all into a Vec<TagView>). Those are read straight from
# instance.attributes in the converter.

[service]
name = "transfer"
crate_name = "winterbaume_transfer"
state_view_module = "views"

# ---------------------------------------------------------------------------
# aws_transfer_server
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_transfer_server"
model = "ServerTfModel"
view = "ServerView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "endpoint_type"
view = "endpoint_type"
type = "string?"

[[resource.field]]
hcl = "identity_provider_type"
view = "identity_provider_type"
type = "string?"

[[resource.field]]
hcl = "domain"
view = "domain"
type = "string?"

[[resource.field]]
hcl = "logging_role"
view = "logging_role"
type = "string?"

[[resource.field]]
hcl = "certificate"
view = "certificate"
type = "string?"

[[resource.field]]
hcl = "security_policy_name"
view = "security_policy_name"
type = "string?"

# ---------------------------------------------------------------------------
# aws_transfer_user
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_transfer_user"
model = "UserTfModel"
view = "UserView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "server_id"
view = "server_id"
type = "string"
required = true

[[resource.field]]
hcl = "user_name"
view = "user_name"
type = "string"
required = true

[[resource.field]]
hcl = "role"
view = "role"
type = "string"
required = true

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "home_directory"
view = "home_directory"
type = "string?"

[[resource.field]]
hcl = "home_directory_type"
view = "home_directory_type"
type = "string?"
