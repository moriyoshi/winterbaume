# Auto-ingested by `tf-converter-codegen ingest ecs`.
# Hand-tuned: split into one [[resource]] block per resource type
# (cluster / task_definition / service). Dropped Vec<T>/nested-block /
# raw-blob fields (capacity_providers, configuration,
# capacity_provider_strategy, container_definitions (JSON blob),
# requires_compatibilities, deployment_controller, network_configuration,
# service_registries, deployment_circuit_breaker, ordered_placement_strategy,
# placement_constraints, tags / tags_all). Those are read straight from
# instance.attributes in the converter. ARN templates and revision-based
# task-definition ARNs are wired up by hand.

[service]
name = "ecs"
crate_name = "winterbaume_ecs"
state_view_module = "views"

# ---------------------------------------------------------------------------
# aws_ecs_cluster
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_ecs_cluster"
model = "ClusterTfModel"
view = "EcsClusterView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

# ---------------------------------------------------------------------------
# aws_ecs_task_definition
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_ecs_task_definition"
model = "TaskDefinitionTfModel"
view = "TaskDefinitionView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "family"
view = "family"
type = "string"
required = true

[[resource.field]]
hcl = "revision"
view = "revision"
type = "i64"
default = 1

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "network_mode"
view = "network_mode"
type = "string?"

[[resource.field]]
hcl = "task_role_arn"
view = "task_role_arn"
type = "string?"

[[resource.field]]
hcl = "execution_role_arn"
view = "execution_role_arn"
type = "string?"

[[resource.field]]
hcl = "cpu"
view = "cpu"
type = "string?"

[[resource.field]]
hcl = "memory"
view = "memory"
type = "string?"

# ---------------------------------------------------------------------------
# aws_ecs_service
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_ecs_service"
model = "ServiceTfModel"
view = "EcsServiceDefView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "task_definition"
view = "task_definition"
type = "string"
required = true

[[resource.field]]
hcl = "cluster"
view = "cluster"
type = "string?"

[[resource.field]]
hcl = "id"
view = "id"
type = "string?"

[[resource.field]]
hcl = "desired_count"
view = "desired_count"
type = "i64"
default = 1

[[resource.field]]
hcl = "launch_type"
view = "launch_type"
type = "string?"

[[resource.field]]
hcl = "scheduling_strategy"
view = "scheduling_strategy"
type = "string?"
