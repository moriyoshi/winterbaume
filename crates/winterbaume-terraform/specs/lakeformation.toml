# Auto-ingested by `tf-converter-codegen ingest lakeformation`.
# Hand-tuned: split into one [[resource]] per Terraform resource type.
# Dropped:
#   - `hybrid_access_enabled` (discarded by the original converter ŌĆö read raw)
#   - `external_data_filtering_allow_list`, `trusted_resource_owners`
#     (Vec<String> on the data_lake_settings ŌĆö not in spec vocab,
#     read raw)
#   - `admins`, `authorized_session_tag_value_list` (Vec<String> ŌĆö not
#     in spec vocab, read raw)
#   - `create_database_default_permissions`,
#     `create_table_default_permissions` (nested-block arrays ŌĆö read raw)

[service]
name = "lakeformation"
crate_name = "winterbaume_lakeformation"
state_view_module = "views"

# ---------------------------------------------------------------------------
# aws_lakeformation_resource
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_lakeformation_resource"
model = "RegisteredResourceTfModel"
view = "RegisteredResourceView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "arn"
view = "resource_arn"
type = "string"
required = true

[[resource.field]]
hcl = "role_arn"
view = "role_arn"
type = "string?"

[[resource.field]]
hcl = "use_service_linked_role"
view = "use_service_linked_role"
type = "bool"
default = false

# ---------------------------------------------------------------------------
# aws_lakeformation_data_lake_settings
# ---------------------------------------------------------------------------

[[resource]]
type = "aws_lakeformation_data_lake_settings"
model = "DataLakeSettingsTfModel"
view = "DataLakeSettingsView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "allow_external_data_filtering"
view = "allow_external_data_filtering"
type = "bool"
default = false

# ---------------------------------------------------------------------------
# aws_lakeformation_lf_tag
# ---------------------------------------------------------------------------
# Dropped:
#   - `values` (Vec<String> ŌĆö not in spec vocab, read raw)

[[resource]]
type = "aws_lakeformation_lf_tag"
model = "LfTagTfModel"
view = "LFTagView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "key"
view = "tag_key"
type = "string"
required = true

[[resource.field]]
hcl = "catalog_id"
view = "catalog_id"
type = "string?"

# ---------------------------------------------------------------------------
# aws_lakeformation_permissions
# ---------------------------------------------------------------------------
# Dropped:
#   - `permissions`, `permissions_with_grant_option` (Vec<String> ŌĆö read raw)
#   - `catalog_resource` (bool) and the resource-selector nested blocks
#     (`data_location`, `database`, `lf_tag`, `lf_tag_policy`, `table`,
#     `table_with_columns`) ŌĆö encoded as a single JSON `resource` value in
#     the converter body
#   - `catalog_id` (top-level ŌĆö only meaningful inside nested resource
#     selectors)

[[resource]]
type = "aws_lakeformation_permissions"
model = "PermissionsTfModel"
view = "PermissionGrantView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "principal"
view = "principal"
type = "string"
required = true

# ---------------------------------------------------------------------------
# aws_lakeformation_resource_lf_tag
# ---------------------------------------------------------------------------
# Dropped:
#   - Nested `database`, `table`, `table_with_columns` resource-selector
#     blocks ŌĆö read raw to build the tag-assignment key
#   - Top-level `catalog_id`, `tag_key`, `tag_value` are spec-vocab strings
#     and round-trip via the model

[[resource]]
type = "aws_lakeformation_resource_lf_tag"
model = "ResourceLfTagTfModel"
view = "LFTagPairView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "catalog_id"
view = "catalog_id"
type = "string?"

# ---------------------------------------------------------------------------
# aws_lakeformation_resource_lf_tags
# ---------------------------------------------------------------------------
# Dropped:
#   - Nested `database`, `table`, `table_with_columns` resource-selector
#     blocks (read raw to derive the tag-assignment key)
#   - Repeated `lf_tag { catalog_id, key, value }` blocks (Vec ŌĆö read raw)

[[resource]]
type = "aws_lakeformation_resource_lf_tags"
model = "ResourceLfTagsTfModel"
view = "LFTagPairView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "catalog_id"
view = "catalog_id"
type = "string?"

# ---------------------------------------------------------------------------
# aws_lakeformation_data_cells_filter
# ---------------------------------------------------------------------------
# winterbaume_lakeformation does not model data-cells filters in state; the
# converter validates the HCL shape and emits a no-op warning. Only the
# inert `table_data { name }` projection is captured here so a typo in HCL
# would still fail the deserialize.

[[resource]]
type = "aws_lakeformation_data_cells_filter"
model = "DataCellsFilterTfModel"
view = "LakeFormationStateView"

[resource.modes]
mode = "model_only"

# ---------------------------------------------------------------------------
# aws_lakeformation_opt_in
# ---------------------------------------------------------------------------
# winterbaume_lakeformation does not model opt-ins in state; converter is
# validation-only.

[[resource]]
type = "aws_lakeformation_opt_in"
model = "OptInTfModel"
view = "LakeFormationStateView"

[resource.modes]
mode = "model_only"

