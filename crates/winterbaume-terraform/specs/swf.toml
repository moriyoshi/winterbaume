[service]
name = "swf"
crate_name = "winterbaume_swf"
state_view_module = "views"

[[resource]]
type = "aws_swf_domain"
model = "DomainTfModel"
view = "DomainView"

[resource.modes]
mode = "model_only"

[[resource.field]]
hcl = "name"
view = "name"
type = "string"
required = true

[[resource.field]]
hcl = "description"
view = "description"
type = "string?"

[[resource.field]]
hcl = "workflow_execution_retention_period_in_days"
view = "workflow_execution_retention_period_in_days"
type = "string?"

[[resource.field]]
hcl = "arn"
view = "arn"
type = "string?"

[[resource.field]]
hcl = "tags"
view = "tags"
type = "tags"
