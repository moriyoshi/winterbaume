tokio = { workspace = true }
serde = { workspace = true }
toml = "0.8"
clap = { version = "4", features = ["derive", "env"] }
serde_json = { workspace = true }
bytes = { workspace = true }
http = { workspace = true }
http-body-util = "0.1"
hyper = { version = "1", features = ["server", "http1"] }
hyper-util = { version = "0.1", features = ["tokio"] }
tracing = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
regex = { workspace = true }

[dev-dependencies]
# AWS SDK clients for the DuckDB round-trip integration test.
# These are only used when the test is compiled, which itself is gated by the
# `backend-sqlengine-duckdb` (or `-bundled`) feature.
aws-config = { workspace = true }
aws-sdk-athena = { workspace = true }
aws-sdk-redshiftdata = { workspace = true }
aws-credential-types = { workspace = true, features = ["test-util"] }

[lints]
workspace = true

# Release builds via cargo-dist link DuckDB statically by enabling the
# `backend-sqlengine-duckdb-bundled` feature. This keeps the public binary
# self-contained ( SQL execution works out of the box ) without forcing the
# slow source build on local `cargo build` / `cargo test`, which still use
# the lean default feature set.
[package.metadata.dist]
features = ["backend-sqlengine-duckdb-bundled"]

# DuckDB round-trip integration test.
# Gate the [[test]] entry on the feature flag so a default `cargo test -p
# winterbaume-server` does not pull DuckDB just to skip the file at compile
# time.
[[test]]
name = "duckdb_round_trip"
path = "tests/duckdb_round_trip.rs"
required-features = ["backend-sqlengine-duckdb"]
