# The workspace entry already pins `default-features = false`; the
# `backend-sqlengine-duckdb` / `-bundled` features below are what decide
# whether DuckDB is compiled from source or linked against a prebuilt
# libduckdb located via DUCKDB_LIB_DIR / DUCKDB_INCLUDE_DIR.
