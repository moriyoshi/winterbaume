[package]
name = "winterbaume-server"
version = "0.2.4"
edition.workspace = true
license.workspace = true
description = "Standalone HTTP server for winterbaume AWS mock services"
repository.workspace = true
keywords.workspace = true
readme = "README.md"

[[bin]]
name = "winterbaume-server"
path = "src/main.rs"

# Optional backend features.
#
# Enable a feature to compile support for an alternative storage backend.
# The backend is only activated at runtime when the corresponding CLI option,
# environment variable, or config-file entry is provided.
#
#   cargo build --features backend-sqs-redis,backend-dynamodb-redis,backend-vfs-fs
#
# The DuckDB-backed Athena / Redshift Data SQL engine has two variants. Pick
# at most one:
#
#   --features backend-sqlengine-duckdb-bundled
#       Compiles DuckDB from source via the wrapper crate's `bundled` feature.
#       Adds several minutes to a clean build but needs no system libraries.
#
#   --features backend-sqlengine-duckdb
#       Links against a prebuilt libduckdb located via DUCKDB_LIB_DIR /
#       DUCKDB_INCLUDE_DIR. Much faster to compile; used by CI.
[features]
default = ["backend-sqs-redis", "backend-dynamodb-redis", "backend-vfs-fs"]
# Redis-backed SQS queue storage (via winterbaume-sqs-redis).
backend-sqs-redis = ["dep:winterbaume-sqs-redis"]
# Redis-backed DynamoDB table/item storage (via winterbaume-dynamodb-redis).
backend-dynamodb-redis = ["dep:winterbaume-dynamodb-redis"]
# Filesystem-backed VFS for S3/Glacier/EBS blob storage (uses FsVfs from
# winterbaume-core; no extra crate dependency).
backend-vfs-fs = []
# DuckDB-backed SQL engine for Athena / Redshift Data, linking against a
# prebuilt libduckdb (DUCKDB_LIB_DIR / DUCKDB_INCLUDE_DIR must be set at
# build time).
backend-sqlengine-duckdb = ["dep:winterbaume-sqlengine-duckdb"]
# Same as `backend-sqlengine-duckdb` but enables the wrapper crate's
# `bundled` feature, which compiles DuckDB from source with no system
# dependencies. Significantly slower to build.
backend-sqlengine-duckdb-bundled = [
    "backend-sqlengine-duckdb",
    "winterbaume-sqlengine-duckdb/bundled",
]

