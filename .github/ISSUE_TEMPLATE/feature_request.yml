    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: Request type
      description: What kind of change is being asked for?
      options:
        - New AWS operation on an existing service
        - New AWS service (no winterbaume crate yet)
        - Behaviour parity with real AWS (existing operation diverges)
        - Terraform converter support
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the requested capability.
      placeholder: e.g., support `S3:SelectObjectContent` so analytics jobs can run against mock S3.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation / use case
      description: Why does this matter? What workflow, tool, or test is blocked without it?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behaviour
      description: What should winterbaume do? Reference the real AWS contract — request shape, response shape, error cases. Link to AWS docs or the Smithy model where possible.
    validations:
      required: true
  - type: input
    id: aws_docs
    attributes:
      label: AWS documentation link
      description: URL to the AWS API reference for the operation(s) in scope.
      placeholder: https://docs.aws.amazon.com/...
    validations:
      required: false
  - type: textarea
    id: workaround
    attributes:
      label: Current workaround
      description: Anything you're doing today to work around the gap (e.g., bypassing winterbaume for this call, stubbing client-side).
    validations:
      required: false
