name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # sccache configuration — uses GitHub Actions cache backend
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache
  # Incremental compilation is incompatible with sccache
  CARGO_INCREMENTAL: "0"

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - 'crates/**'
              - 'src/**'
              - 'tools/**'
              - 'examples/**'
              - 'vendor/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rustfmt.toml'
              - 'dist-workspace.toml'
              - '.gitmodules'
              - '.github/workflows/ci.yml'
              - '.github/actions/**'

  # Hash the code-relevant tree and probe per-job cache markers. A marker for
  # `ci-pass-<job>-<os>-<hash>` exists only when a prior run finished that job
  # successfully against the exact same source tree; in that case the job
  # below is skipped via its own `if:`, and downstream jobs use `!failure() &&
  # !cancelled()` so a `skipped` upstream still lets them run.
  fingerprint:
    name: Fingerprint and probe prior-pass markers
    runs-on: ubuntu-latest
    needs:
      - changes
    if: |
      github.event_name != 'push' ||
      needs.changes.outputs.code == 'true'
    outputs:
      hash: ${{ steps.hash.outputs.value }}
      fmt-hit: ${{ steps.fmt.outputs.cache-hit }}
      clippy-hit: ${{ steps.clippy.outputs.cache-hit }}
      test-hit: ${{ steps.test.outputs.cache-hit }}
      examples-hit: ${{ steps.examples.outputs.cache-hit }}
      e2e-hit: ${{ steps.e2e.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - id: hash
        run: |
          echo "value=${{ hashFiles('crates/**', 'src/**', 'tools/**', 'examples/**', 'Cargo.toml', 'Cargo.lock', 'rustfmt.toml', 'dist-workspace.toml', '.gitmodules', '.github/workflows/ci.yml', '.github/actions/**') }}" >> "$GITHUB_OUTPUT"
      - id: fmt
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .ci-marker
          key: ci-pass-fmt-${{ runner.os }}-${{ steps.hash.outputs.value }}
          lookup-only: true
      - id: clippy
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .ci-marker
          key: ci-pass-clippy-${{ runner.os }}-${{ steps.hash.outputs.value }}
          lookup-only: true
      - id: test
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .ci-marker
          key: ci-pass-test-${{ runner.os }}-${{ steps.hash.outputs.value }}
          lookup-only: true
      - id: examples
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .ci-marker
          key: ci-pass-examples-${{ runner.os }}-${{ steps.hash.outputs.value }}
          lookup-only: true
      - id: e2e
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .ci-marker
          key: ci-pass-e2e-${{ runner.os }}-${{ steps.hash.outputs.value }}
          lookup-only: true

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    needs:
      - changes
      - fingerprint
    if: |
      needs.fingerprint.outputs.fmt-hit != 'true' && (
        github.event_name != 'push' ||
        needs.changes.outputs.code == 'true'
      )
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          components: rustfmt
      - run: cargo fmt --all --check
      - run: mkdir -p .ci-marker && echo "${{ needs.fingerprint.outputs.hash }}" > .ci-marker/marker
      - uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .ci-marker
          key: ci-pass-fmt-${{ runner.os }}-${{ needs.fingerprint.outputs.hash }}

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs:
      - changes
      - fingerprint
      - fmt
    if: |
      !failure() && !cancelled() &&
      needs.fingerprint.outputs.clippy-hit != 'true' && (
        github.event_name != 'push' ||
        needs.changes.outputs.code == 'true'
      )
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          components: clippy
      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad  # v0.0.9
      - uses: ./.github/actions/setup-duckdb
      - run: cargo clippy --workspace --exclude winterbaume-sqlengine-duckdb --all-targets --all-features -- -D warnings
      - run: cargo clippy -p winterbaume-sqlengine-duckdb --no-default-features --all-targets -- -D warnings
      - run: mkdir -p .ci-marker && echo "${{ needs.fingerprint.outputs.hash }}" > .ci-marker/marker
      - uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .ci-marker
          key: ci-pass-clippy-${{ runner.os }}-${{ needs.fingerprint.outputs.hash }}

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs:
      - changes
      - fingerprint
      - clippy
    if: |
      !failure() && !cancelled() &&
      needs.fingerprint.outputs.test-hit != 'true' && (
        github.event_name != 'push' ||
        needs.changes.outputs.code == 'true'
      )
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad  # v0.0.9
      - uses: ./.github/actions/setup-duckdb
      - run: cargo test --workspace --exclude winterbaume-sqlengine-duckdb --no-fail-fast
      - run: cargo test -p winterbaume-sqlengine-duckdb --no-default-features --no-fail-fast
      - run: mkdir -p .ci-marker && echo "${{ needs.fingerprint.outputs.hash }}" > .ci-marker/marker
      - uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .ci-marker
          key: ci-pass-test-${{ runner.os }}-${{ needs.fingerprint.outputs.hash }}

  examples:
    name: Examples
    runs-on: ubuntu-latest
    needs:
      - changes
      - fingerprint
      - clippy
    if: |
      !failure() && !cancelled() &&
      needs.fingerprint.outputs.examples-hit != 'true' && (
        github.event_name != 'push' ||
        needs.changes.outputs.code == 'true'
      )
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad  # v0.0.9
      - run: cargo build --examples -p winterbaume
      - run: mkdir -p .ci-marker && echo "${{ needs.fingerprint.outputs.hash }}" > .ci-marker/marker
      - uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .ci-marker
          key: ci-pass-examples-${{ runner.os }}-${{ needs.fingerprint.outputs.hash }}

  e2e:
    name: E2E (Terraform)
    runs-on: ubuntu-latest
    needs:
      - changes
      - fingerprint
      - test
    if: |
      !failure() && !cancelled() &&
      needs.fingerprint.outputs.e2e-hit != 'true' && (
        github.event_name != 'push' ||
        needs.changes.outputs.code == 'true'
      )
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad  # v0.0.9
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85  # v4.0.0
        with:
          terraform_wrapper: false
      - run: cargo test -p winterbaume-e2e-tests --test terraform -- --ignored
        env:
          WINTERBAUME_TF_TMP_DIR: ${{ runner.temp }}/winterbaume
      - name: Upload terraform trace logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: tf-logs
          path: ${{ runner.temp }}/winterbaume/tf-logs/
          if-no-files-found: ignore
      - run: mkdir -p .ci-marker && echo "${{ needs.fingerprint.outputs.hash }}" > .ci-marker/marker
      - uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .ci-marker
          key: ci-pass-e2e-${{ runner.os }}-${{ needs.fingerprint.outputs.hash }}
