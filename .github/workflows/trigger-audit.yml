name: Trigger Integrity Audit

on:
  push:
    branches: ["main"]

jobs:
  trigger:
    runs-on: ubuntu-latest
    environment: ci
    steps:
      - name: Dispatch audit workflow
        env:
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }} <${{ github.event.head_commit.author.email }}>
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_TIMESTAMP: ${{ github.event.head_commit.timestamp }}
          AUDIT_DISPATCH_PAT: ${{ secrets.GH_PAT_WINTERBAUME_AUDIT_MAIN_REPO }}
        run: |
          jq -n \
            --arg sha "$COMMIT_SHA" \
            --arg author "$COMMIT_AUTHOR" \
            --arg message "$(echo "$COMMIT_MESSAGE" | head -1)" \
            --arg timestamp "$COMMIT_TIMESTAMP" \
            '{
              ref: "main",
              inputs: {
                commit_sha:        $sha,
                commit_author:     $author,
                commit_message:    $message,
                commit_timestamp:  $timestamp
              }
            }' | \
          curl -f -s -X POST \
            -H "Authorization: Bearer $AUDIT_DISPATCH_PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            -d @- \
            https://api.github.com/repos/winterbaume-automation/audit-main-repo/actions/workflows/audit-commit.yml/dispatches
