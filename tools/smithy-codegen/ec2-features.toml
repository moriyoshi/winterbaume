# Operation -> Cargo-feature-slug map for winterbaume-ec2-generated.
#
# This file drives `smithy-codegen gen-serializers ec2 --features-map ...`
# which emits #[cfg(feature = "...")] attributes on per-operation
# generated code. Types referenced by operations in two or more feature
# slugs are emitted unconditionally as shared core code.
#
# Groupings are coarse on purpose: finer-grained features add maintenance
# overhead without much extra build-time benefit. Tweak as needed.

default_feature = "extras"

