[workspace.lints.rust]
# Generated model code defines types/functions ahead of handler implementation.
dead_code = "allow"
unused_variables = "allow"
unused_mut = "allow"

[workspace.lints.clippy]
# High-volume lints from generated / boilerplate code — allow workspace-wide.
let_and_return = "allow"
single_match = "allow"
too_many_arguments = "allow"
collapsible_if = "allow"
needless_update = "allow"
type_complexity = "allow"
box_collection = "allow"
result_large_err = "allow"

[workspace.package]
edition = "2024"
license = "Apache-2.0"
repository = "https://github.com/moriyoshi/winterbaume"
keywords = ["aws", "mock", "testing"]

# cargo-release configuration
[workspace.metadata.release]
shared-version = false
consolidate-commits = true
allow-branch = ["main"]
tag-name = "{{crate_name}}-v{{version}}"
pre-release-commit-message = "chore: release {{crate_name}} v{{version}}"
tag-message = "chore: release {{crate_name}} v{{version}}"
# Disable build verification during publish — cross-crate deps within the
# workspace may not be on crates.io yet when publishing in order.
verify = false

