serde = { version = "1", features = ["derive"] }
serde_json = "1"
urlencoding = "2"

# PartiQL
partiql-parser = "0.14"
partiql-ast = "0.14"

# SQL engine
# `bundled` is intentionally NOT enabled here. The wrapper crate
# `winterbaume-sqlengine-duckdb` re-exports it as its own `bundled`
# default feature so local builds remain turnkey, while CI can opt out
# via `--no-default-features` and link against a prebuilt libduckdb.
duckdb = { version = "1" }
papera = "0.1"

# Utilities
regex = "1"
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
tracing = "0.1"
thiserror = "2"
md-5 = "0.10"
sha2 = "0.10"
hmac = "0.12"
base64 = "0.22"
x509-parser = "0.16"
rand = "0.9"
aes-gcm = "0.10"
ciborium = "0.2"
redis = { version = "0.27", features = ["tokio-comp", "aio", "connection-manager"] }

