[package]
name = "winterbaume"
version = "0.2.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
keywords.workspace = true
readme = "README.md"
description = "Mock AWS services for local development and testing"
# Disable auto-discovery of examples/*.rs so cargo does not register them as
# umbrella crate targets. The example files exist for in-tree usage only and
# are intentionally not packaged.
autoexamples = false
# Restrict the published .crate to umbrella sources and legal/notice files.
# Without this, cargo would package every tracked file at the workspace root
# (.agents, vendor, docs, examples, etc.).
include = [
    "/src/**/*.rs",
    "/Cargo.toml",
    "/README.md",
    "/LICENSE",
    "/NOTICE",
    "/CHANGELOG.md",
]

[lints]
workspace = true

